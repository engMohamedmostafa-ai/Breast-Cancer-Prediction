<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Model Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: #ffffff;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
        h1 {
            text-align: center;
            color: #333333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #5cb85c;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
        }
        button:hover {
            background-color: #4cae4c;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #dcdcdc;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ML Model Predictor</h1>
        <div class="form-group">
            <label for="model">Select Model:</label>
            <select id="model">
                <option value="svm">SVM</option>
                <option value="random_forest">Random Forest</option>
            </select>
        </div>
        <div class="form-group">
            <label for="features">Enter Features (comma-separated, 30 values):</label>
            <input type="text" id="features" placeholder="e.g., 1.0, 2.5, 3.3, ..., 0.7">
        </div>
        <button onclick="predict()">Get Prediction</button>
        <div id="result" class="result"></div>
    </div>

    <script>
        async function predict() {
            const model = document.getElementById('model').value;
            const featuresInput = document.getElementById('features').value;

            // Convert features input to an array
            const features = featuresInput.split(',').map(value => value.trim());

            // Validate the input
            if (features.length !== 30) {
                document.getElementById('result').innerHTML = '<span class="error">Error: Exactly 30 features are required.</span>';
                return;
            }

            if (features.some(isNaN)) {
                document.getElementById('result').innerHTML = '<span class="error">Error: All features must be valid numbers.</span>';
                return;
            }

            // Convert the features to numbers
            const numericFeatures = features.map(Number);

            // API request payload
            const payload = {
                model: model,
                features: numericFeatures
            };

            try {
                // Send POST request to the Flask API
                const response = await fetch('http://127.0.0.1:5000/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                });

                if (!response.ok) {
                    throw new Error(Error: ${response.statusText});
                }

                const data = await response.json();

                // Interpret the prediction
                const predictionText = data.prediction === 1 
                    ? "Malignant (Cancerous)" 
                    : "Benign (Non-Cancerous)";

                document.getElementById('result').innerHTML = `
                    <strong>Model:</strong> ${data.model}<br>
                    <strong>Prediction:</strong> ${predictionText}
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = <span class="error">Error: ${error.message}</span>;
            }
        }
    </script>
</body>
</html>
